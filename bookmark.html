<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Craft Dreams Co. — Bookmark Back</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;1,400&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #d8d0c8;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px;
  }

  /* 7" x 2" at 96dpi screen = 672 x 192px */
  .bookmark {
    width: 672px;
    height: 192px;
    background: linear-gradient(
      to right,
      #FFE8E8 0%,
      #FFF5F0 25%,
      #FFF9F4 50%,
      #F0FAF8 75%,
      #E8F8F5 100%
    );
    display: flex;
    flex-direction: row;
    align-items: center;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18);
  }

  /* Soft radial glow top-left */
  .bookmark::before {
    content: '';
    position: absolute;
    top: -40px;
    left: -40px;
    width: 280px;
    height: 280px;
    background: radial-gradient(circle, rgba(255,180,180,0.25) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Soft radial glow bottom-right */
  .bookmark::after {
    content: '';
    position: absolute;
    bottom: -40px;
    right: -20px;
    width: 220px;
    height: 220px;
    background: radial-gradient(circle, rgba(46,196,182,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── LOGO SECTION ── */
  .logo-section {
    flex-shrink: 0;
    width: 188px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
    padding: 10px 0 10px 12px;
  }

  .logo-section img {
    width: 164px;
    height: 164px;
    object-fit: contain;
  }

  /* ── VERTICAL DIVIDER ── */
  .divider {
    width: 1px;
    height: 130px;
    background: linear-gradient(to bottom, transparent, #B58863, #C9A876, #B58863, transparent);
    flex-shrink: 0;
    position: relative;
    z-index: 1;
    margin: 0 4px;
  }

  /* ── CONTENT SECTION ── */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 12px 16px 12px 12px;
    position: relative;
    z-index: 1;
  }

  /* Tagline */
  .tagline {
    font-family: 'Poppins', sans-serif;
    font-weight: 300;
    font-size: 8.5px;
    letter-spacing: 2.2px;
    text-transform: uppercase;
    color: #3D2314;
    text-align: center;
    line-height: 1.7;
  }

  /* Gold micro-divider */
  .gold-line {
    width: 120px;
    height: 1px;
    background: linear-gradient(to right, transparent, #B58863, #D4A96A, #B58863, transparent);
  }

  /* Social row */
  .social-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .social-item {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .social-item svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }

  .social-text {
    font-family: 'Poppins', sans-serif;
    font-weight: 300;
    font-size: 8px;
    color: #5A2D23;
    letter-spacing: 0.3px;
  }

  .social-sep {
    font-size: 8px;
    color: #C4A090;
    font-family: 'Poppins', sans-serif;
  }

  /* Website + location row */
  .bottom-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .web-text {
    font-family: 'Poppins', sans-serif;
    font-weight: 300;
    font-size: 7.5px;
    color: #2EC4B6;
    letter-spacing: 0.2px;
  }

  .loc-sep {
    font-size: 7.5px;
    color: #C4A090;
    font-family: 'Poppins', sans-serif;
  }

  .loc-text {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 7.5px;
    color: #9A7060;
    letter-spacing: 0.2px;
  }
</style>
</head>
<body>
<div class="bookmark">

  <!-- Logo -->
  <div class="logo-section">
    <img src="https://craftdreamsco.github.io/CraftDreamsCo/Craft_Dreams_Logo.PNG"
         alt="Craft Dreams Co."
         onerror="this.src='/mnt/project/Craft_Dreams_Logo.PNG'">
  </div>

  <!-- Vertical divider -->
  <div class="divider"></div>

  <!-- Content -->
  <div class="content">

    <!-- Tagline -->
    <div class="tagline">
      PERSONALIZED. THEMED.<br>HANDCRAFTED WITH LOVE. ✨
    </div>

    <!-- Gold line -->
    <div class="gold-line"></div>

    <!-- Social icons row -->
    <div class="social-row">

      <!-- Instagram -->
      <div class="social-item">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="ig-grad" cx="30%" cy="107%" r="150%">
              <stop offset="0%" stop-color="#fdf497"/>
              <stop offset="5%" stop-color="#fdf497"/>
              <stop offset="45%" stop-color="#fd5949"/>
              <stop offset="60%" stop-color="#d6249f"/>
              <stop offset="90%" stop-color="#285AEB"/>
            </radialGradient>
          </defs>
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5" fill="url(#ig-grad)"/>
          <circle cx="12" cy="12" r="4.5" fill="none" stroke="white" stroke-width="1.5"/>
          <circle cx="17.2" cy="6.8" r="1.2" fill="white"/>
        </svg>
        <span class="social-text">@craftdreamsco</span>
      </div>

      <span class="social-sep">·</span>

      <!-- Facebook -->
      <div class="social-item">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="20" height="20" rx="4" ry="4" fill="#1877F2"/>
          <path d="M15.5 8H13.5C13.2 8 13 8.2 13 8.5V10H15.5L15.1 12.5H13V20H10.5V12.5H9V10H10.5V8.3C10.5 6.5 11.6 5 13.5 5H15.5V8Z"
                fill="white"/>
        </svg>
        <span class="social-text">@craftdreamsco</span>
      </div>

    </div>

    <!-- Website + location -->
    <div class="bottom-row">
      <span class="web-text">craftdreamsco.github.io</span>
      <span class="loc-sep">·</span>
      <span class="loc-text">Whitby, ON</span>
    </div>

  </div>

</div>
</body>
</html>
